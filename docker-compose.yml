# Full streaming topology: Redpanda + the four services, each from one app image.
# Real data flows: ingestion -> trades.raw -> Bytewax processor -> features.out
# -> predictor -> predictions.out -> serving (WebSocket + dashboard on :8000).
# Redpanda auto-creates topics on first produce.

x-app: &app
  build: .
  image: realtime-alpha:local
  depends_on:
    redpanda:
      condition: service_healthy
  restart: unless-stopped

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 12

  console:
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  ingestion:
    <<: *app
    command: realtime-alpha ingest --brokers redpanda:9092 --symbols BTCUSDT,ETHUSDT --source rest

  processor:
    <<: *app
    command: python -m bytewax.run realtime_alpha.processor.bytewax_app:flow
    environment:
      RTA_BROKERS: redpanda:9092

  predictor:
    <<: *app
    command: realtime-alpha predict --brokers redpanda:9092 --strategies momentum

  serving:
    <<: *app
    command: realtime-alpha serve --host 0.0.0.0 --port 8000
    environment:
      RTA_BROKERS: redpanda:9092
    ports:
      - "8000:8000"
