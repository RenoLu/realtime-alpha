# Full streaming topology: Redpanda + the services, each from one app image.
# Real data flows: ingestion -> trades.raw -> Bytewax processor -> features.out
# -> predictor -> predictions.out -> evaluator (joins each prediction with the realized
# price after its horizon) -> scores.out -> serving (WebSocket + dashboard on :8000,
# live strategy leaderboard). Redpanda auto-creates topics on first produce.

x-app: &app
  build: .
  image: realtime-alpha:local
  depends_on:
    redpanda:
      condition: service_healthy
  restart: unless-stopped

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 12

  console:
    image: redpandadata/console:v2.7.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  ingestion:
    <<: *app
    command: realtime-alpha ingest --brokers redpanda:9092 --symbols BTCUSDT,ETHUSDT --source rest

  processor:
    <<: *app
    command: python -m bytewax.run realtime_alpha.processor.bytewax_app:flow
    environment:
      RTA_BROKERS: redpanda:9092

  predictor:
    <<: *app
    command: realtime-alpha predict --brokers redpanda:9092 --strategies momentum

  evaluator:
    <<: *app
    command: realtime-alpha evaluate --brokers redpanda:9092

  serving:
    <<: *app
    command: realtime-alpha serve --host 0.0.0.0 --port 8000
    environment:
      RTA_BROKERS: redpanda:9092
      RTA_DATABASE_URL: ${RTA_DATABASE_URL:-}  # set => durable leaderboard (rebuilt on restart)
    ports:
      - "8000:8000"

  # Lakehouse sink: features/predictions/outcomes -> Parquet on R2 (free egress). Runs only
  # when R2 creds are set (else it exits); the always-on demo costs ~$0.
  sink:
    <<: *app
    command: realtime-alpha sink --brokers redpanda:9092
    environment:
      RTA_R2_ENDPOINT: ${RTA_R2_ENDPOINT:-}
      RTA_R2_BUCKET: ${RTA_R2_BUCKET:-}
      RTA_R2_ACCESS_KEY_ID: ${RTA_R2_ACCESS_KEY_ID:-}
      RTA_R2_SECRET_ACCESS_KEY: ${RTA_R2_SECRET_ACCESS_KEY:-}

  # Social-sentiment poller and off-path deep-analysis chain, run as standalone services
  # (real StockTwits/Reddit; Claude when ANTHROPIC_API_KEY is set, else a deterministic
  # mock). In the single-process `serve` path these feed the LLM strategies directly; in
  # this Kafka topology they log their output — distributing sentiment/deep over topics
  # into the predictor is the next step.
  sentiment:
    <<: *app
    command: realtime-alpha sentiment --symbols BTCUSDT,ETHUSDT --interval 45

  deep:
    <<: *app
    command: realtime-alpha deep --symbols BTCUSDT,ETHUSDT --interval 3600
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
