name: keep-warm

# Pings the free-tier Render service so it doesn't sleep after 15 min idle — which also
# keeps the live pipeline ingesting and the self-grading leaderboard populated. (For a
# fully durable leaderboard across any sleep, provision Neon + set RTA_DATABASE_URL.)
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -fsS --max-time 90 https://realtime-alpha.onrender.com/health || true
