target-version = "py312"
line-length = 100
# Vendored third-party code (TradingAgents connectors) — linted upstream, not by us.
extend-exclude = ["src/realtime_alpha/dataflows"]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line length handled by formatter

[lint.isort]
known-first-party = ["realtime_alpha"]
